{% extends "adminpanel/base_admin.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}

<div class="delete-panel">
  <div class="delete-icon">
    <i class="bi bi-trash3"></i>
  </div>
  <h4 style="font-weight: 700; color: var(--dark); margin-bottom: 0.5rem;">{{ title }}</h4>
  <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem;">
    Are you sure you want to delete <strong style="color: var(--dark);">{{ object }}</strong>?
    <br>This action <strong>cannot be undone.</strong>
  </p>

  <form method="post">
    {% csrf_token %}
    <div style="display: flex; gap: 10px; justify-content: center;">
      <a href="{{ list_url }}" class="btn-cancel">Cancel</a>
      <button type="submit" class="btn-save" style="background: var(--danger);">
        <i class="bi bi-trash" style="margin-right: 4px;"></i> Yes, Delete
      </button>
    </div>
  </form>
</div>

{% endblock %}
